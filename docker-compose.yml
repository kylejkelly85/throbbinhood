version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app.py:/app/app.py
      - ./src:/app/src
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./logs:/app/logs
    environment:
       - PYTHONUNBUFFERED=1   # ensures print() flushes immediately
       - DATABASE_URL=sqlite+aiosqlite:///data/pipeline.db
       - LOG_LEVEL=INFO
       - DOWNLOAD_DIR=downloads/
       - CONFIDENCE_THRESHOLD=0.7
       - PLAYWRIGHT_CHROMIUM_ARGS=--no-sandbox --disable-setuid-sandbox
       - CRAWLEE_CHROMIUM_SANDBOX=false
       - CHROMIUM_SANDBOX=false

    restart: unless-stopped

